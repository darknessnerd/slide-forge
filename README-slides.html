<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presentation</title>

  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/purecss@3.0.0/build/pure-min.css"
        crossorigin="anonymous">

  
  <style>
:root {
  --bg: #f0f2f5;
  --surface: #ffffff;
  --text: #1a1a2e;
  --subtext: #4a4a6a;
  --accent: #0052cc;
  --accent-hover: #0041a3;
  --border: #c1c7d0;
  --code-bg: #eaecf0;
  --nav-bg: rgba(240,242,245,0.97);
  --progress-bg: #c1c7d0;
  --progress-fill: #0052cc;
  --notes-bg: #e8f0fe;
  --notes-border: #0052cc;
  --slide-shadow: 0 2px 12px rgba(0,0,0,0.12);
}</style>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      overflow: hidden;
    }

     
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #slides-viewport {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

     
    .slide {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 4rem 6rem;
      background: var(--surface);
      box-shadow: var(--slide-shadow);
      will-change: opacity, transform;
    }

     
     
    .t-enter        { transition: opacity 280ms ease; }
    .t-enter-start  { opacity: 0; }
    .t-enter-end    { opacity: 1; }
    .t-leave        { transition: opacity 200ms ease; }
    .t-leave-start  { opacity: 1; }
    .t-leave-end    { opacity: 0; }

    .ts-enter        { transition: transform 300ms cubic-bezier(.4,0,.2,1), opacity 300ms ease; }
    .ts-enter-start  { transform: translateX(60px); opacity: 0; }
    .ts-enter-end    { transform: translateX(0);    opacity: 1; }
    .ts-leave        { transition: transform 220ms ease, opacity 220ms ease; }
    .ts-leave-start  { transform: translateX(0);    opacity: 1; }
    .ts-leave-end    { transform: translateX(-60px);opacity: 0; }

     
    .slide[data-type="title"] {
      text-align: center;
      background: linear-gradient(135deg, var(--surface) 0%, var(--bg) 100%);
    }

    .slide[data-type="title"] .slide-title {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 1.5rem;
    }

     
    .slide[data-type="section"] {
      background: var(--accent);
      color: #fff;
    }

    .slide[data-type="section"] .slide-title {
      font-size: clamp(1.8rem, 4vw, 3rem);
      font-weight: 600;
      color: #fff;
    }

     
    .slide[data-type="summary"] .slide-title {
      color: var(--accent);
    }

     
    .slide-title {
      font-size: clamp(1.4rem, 3vw, 2.2rem);
      font-weight: 600;
      margin-bottom: 1.25rem;
      color: var(--text);
      align-self: flex-start;
      width: 100%;
    }

    .slide-content {
      width: 100%;
      max-width: 900px;
      font-size: clamp(1rem, 1.8vw, 1.2rem);
    }

    .slide-content p   { margin-bottom: 0.75rem; }
    .slide-content ul,
    .slide-content ol  { padding-left: 1.5rem; margin-bottom: 0.75rem; }
    .slide-content li  { margin-bottom: 0.35rem; }

    .slide-content code {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.1em 0.4em;
      font-size: 0.9em;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    }

    .slide-content pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem 1.5rem;
      overflow-x: auto;
      margin-bottom: 0.75rem;
    }

    .slide-content pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: 0.9em;
    }

    .slide-content table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 0.75rem;
      font-size: 0.95em;
    }

    .slide-content th,
    .slide-content td {
      border: 1px solid var(--border);
      padding: 0.5rem 0.75rem;
      text-align: left;
    }

    .slide-content th {
      background: var(--code-bg);
      font-weight: 600;
    }

    .slide-content blockquote {
      border-left: 4px solid var(--accent);
      padding-left: 1rem;
      color: var(--subtext);
      margin-bottom: 0.75rem;
    }

     
    #progress-bar-wrap {
      height: 4px;
      background: var(--progress-bg);
    }

    #progress-bar {
      height: 100%;
      background: var(--progress-fill);
      transition: width 280ms ease;
    }

     
    #nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 0.75rem 1.5rem;
      background: var(--nav-bg);
      border-top: 1px solid var(--border);
      backdrop-filter: blur(8px);
    }

    #nav button {
      min-width: 80px;
      padding: 0.4rem 1.1rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 150ms, color 150ms, border-color 150ms;
    }

    #nav button:not(:disabled):hover {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    #nav button:disabled {
      opacity: 0.35;
      cursor: default;
    }

    #slide-counter {
      font-size: 0.85rem;
      color: var(--subtext);
      min-width: 70px;
      text-align: center;
    }

    #fullscreen-btn {
      margin-left: auto;
    }

     
    #notes-panel {
      padding: 0.75rem 2rem;
      background: var(--notes-bg);
      border-top: 3px solid var(--notes-border);
      font-size: 0.85rem;
      color: var(--subtext);
      max-height: 120px;
      overflow-y: auto;
    }

    #notes-panel strong {
      color: var(--text);
    }

     
    #slide-badge {
      position: absolute;
      bottom: 0.6rem;
      right: 1rem;
      font-size: 0.7rem;
      color: var(--subtext);
      opacity: 0.5;
    }

     
    #thumb-strip {
      display: flex;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      overflow-x: auto;
      background: var(--bg);
      border-top: 1px solid var(--border);
    }

    .thumb {
      flex-shrink: 0;
      width: 100px;
      height: 65px;
      border: 2px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      text-align: center;
      padding: 4px;
      overflow: hidden;
      transition: border-color 120ms;
    }

    .thumb.active {
      border-color: var(--accent);
    }

     
    @media (max-width: 600px) {
      .slide { padding: 2rem 1.5rem; }
      #nav button { min-width: 60px; padding: 0.35rem 0.7rem; font-size: 0.8rem; }
    }
  </style>
</head>

<body>
<div id="app"
     x-data="presentation()"
     x-init="init()"
     @keydown.window="handleKey($event)">

  
  
  <div id="progress-bar-wrap">
    <div id="progress-bar" :style="`width:${progress}%`"></div>
  </div>
  

  
  <div id="slides-viewport">
    <template x-for="(slide, index) in slides" :key="index">
      
      <section class="slide"
               :data-type="slide.type"
               x-show="current === index"
               x-transition:enter="ts-enter"
               x-transition:enter-start="ts-enter-start"
               x-transition:enter-end="ts-enter-end"
               x-transition:leave="ts-leave"
               x-transition:leave-start="ts-leave-start"
               x-transition:leave-end="ts-leave-end">
      
        <h1 class="slide-title" x-text="slide.title" x-show="slide.title"></h1>
        <div class="slide-content" x-html="slide.content"></div>
        <span id="slide-badge" x-text="`${index + 1} / ${slides.length}`"></span>
      </section>
    </template>
  </div>

  
  
  <div id="notes-panel" x-show="slides[current] && slides[current].notes">
    <strong>Notes:</strong>
    <span x-text="slides[current] ? slides[current].notes : ''"></span>
  </div>
  

  
  <div id="nav">
    <button @click="prev()" :disabled="current === 0">&#8592; Prev</button>
    <span id="slide-counter" x-text="`${current + 1} / ${slides.length}`"></span>
    <button @click="next()" :disabled="current === slides.length - 1">Next &#8594;</button>
    <button id="fullscreen-btn" @click="toggleFullscreen()" title="Fullscreen">&#9974;</button>
    <button @click="showThumbs = !showThumbs" title="Thumbnails">&#9783;</button>
  </div>

  
  <div id="thumb-strip" x-show="showThumbs">
    <template x-for="(slide, index) in slides" :key="index">
      <div class="thumb"
           :class="{ active: current === index }"
           @click="goto(index)"
           x-text="(index + 1) + '. ' + (slide.title || '…')">
      </div>
    </template>
  </div>

</div>


<script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>

<script>
  function presentation() {
    return {
      current: 0,
      showThumbs: false,
      slides: [{"type":"title","title":"slide-forge","content":"\u003cp\u003e\u003cimg src=\"https://img.shields.io/badge/Claude_Code-compatible-6B48FF?logo=anthropic\u0026amp;logoColor=white\" alt=\"Claude Code\"\u003e\n\u003cimg src=\"https://img.shields.io/badge/MCP-slide--forge-0078D4?logo=amazonwebservices\u0026amp;logoColor=white\" alt=\"MCP\"\u003e\n\u003cimg src=\"https://img.shields.io/badge/Go-1.26-00ADD8?logo=go\u0026amp;logoColor=white\" alt=\"Go\"\u003e\n\u003cimg src=\"https://img.shields.io/badge/maintained-yes-brightgreen\" alt=\"Maintained\"\u003e\u003c/p\u003e\n\u003cp\u003eMCP server that converts Markdown into standalone HTML slide presentations. Single portable \u003ccode\u003e.html\u003c/code\u003e output — no server required to view.\u003c/p\u003e","notes":""},{"type":"section","title":"Preview","content":"\u003cp\u003e\u003ca href=\"https://darknessnerd.github.io/slide-forge/README-slides.html\"\u003e\u003cimg src=\"./docs/readme-slides.png\" alt=\"README slides preview\"\u003e\u003c/a\u003e\u003c/p\u003e\n\u003cp\u003eThe screenshot above mirrors the preview published by GitHub Actions, and the linked slide deck stays in sync with \u003ccode\u003eREADME-slides.html\u003c/code\u003e.\u003c/p\u003e\n\u003chr\u003e","notes":""},{"type":"content","title":"Local development setup","content":"","notes":""},{"type":"content","title":"1. Clone and verify it builds","content":"\u003cpre\u003e\u003ccode class=\"language-bash\"\u003egit clone https://github.com/darknessnerd/slide-forge.git\ncd slide-forge\ngo build ./...\ngo test -race ./...\n\u003c/code\u003e\u003c/pre\u003e","notes":""},{"type":"content","title":"2. Wire it into Claude Code","content":"\u003cp\u003eAdd to your project's \u003ccode\u003e.mcp.json\u003c/code\u003e (or \u003ccode\u003e~/.claude/mcp.json\u003c/code\u003e for global use):\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"language-json\"\u003e{\n  \u0026quot;mcpServers\u0026quot;: {\n    \u0026quot;slide-forge\u0026quot;: {\n      \u0026quot;command\u0026quot;: \u0026quot;go\u0026quot;,\n      \u0026quot;args\u0026quot;: [\u0026quot;run\u0026quot;, \u0026quot;./cmd\u0026quot;],\n      \u0026quot;cwd\u0026quot;: \u0026quot;/absolute/path/to/slide-forge\u0026quot;\n    }\n  }\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eClaude Code spawns the process automatically on startup via stdio — no env vars needed.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003ePrereq:\u003c/strong\u003e Go 1.21+.\u003c/p\u003e","notes":""},{"type":"content","title":"3. Verify the tool is available","content":"\u003cp\u003eOpen Claude Code in any project and ask:\u003c/p\u003e\n\u003cpre\u003e\u003ccode\u003eList available MCP tools.\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eYou should see \u003ccode\u003emd_to_html_slides\u003c/code\u003e in the list.\u003c/p\u003e","notes":""},{"type":"content","title":"4. Try it","content":"\u003cpre\u003e\u003ccode\u003eConvert README.md into slides using the slide-forge tool.\nUse corporate theme. Save to README-slides.html.\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eOpen the generated \u003ccode\u003e.html\u003c/code\u003e file in any browser — no server required.\u003c/p\u003e\n\u003chr\u003e","notes":""},{"type":"section","title":"Configuration","content":"\u003cp\u003eConfig is loaded from \u003ccode\u003econfig/config.yaml\u003c/code\u003e (or \u003ccode\u003eCONFIG_PATH\u003c/code\u003e env var). All values support \u003ccode\u003e${env:VAR=default}\u003c/code\u003e substitution.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"language-yaml\"\u003e# config/config.yaml\ntransport: ${env:MCP_TRANSPORT=stdio}\naddr:      ${env:ADDR=:8080}\nlog_level: ${env:LOG_LEVEL=info}\n\u003c/code\u003e\u003c/pre\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eVariable\u003c/th\u003e\n\u003cth\u003eDefault\u003c/th\u003e\n\u003cth\u003eDescription\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ccode\u003eMCP_TRANSPORT\u003c/code\u003e\u003c/td\u003e\n\u003ctd\u003e\u003ccode\u003estdio\u003c/code\u003e\u003c/td\u003e\n\u003ctd\u003e\u003ccode\u003estdio\u003c/code\u003e for Claude Code local use, \u003ccode\u003ehttp\u003c/code\u003e for remote/public\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ccode\u003eADDR\u003c/code\u003e\u003c/td\u003e\n\u003ctd\u003e\u003ccode\u003e:8080\u003c/code\u003e\u003c/td\u003e\n\u003ctd\u003eHTTP listen address (HTTP mode only)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ccode\u003eLOG_LEVEL\u003c/code\u003e\u003c/td\u003e\n\u003ctd\u003e\u003ccode\u003einfo\u003c/code\u003e\u003c/td\u003e\n\u003ctd\u003e\u003ccode\u003edebug\u003c/code\u003e, \u003ccode\u003einfo\u003c/code\u003e, \u003ccode\u003ewarn\u003c/code\u003e, \u003ccode\u003eerror\u003c/code\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ccode\u003eCONFIG_PATH\u003c/code\u003e\u003c/td\u003e\n\u003ctd\u003e\u003ccode\u003e./config/config.yaml\u003c/code\u003e\u003c/td\u003e\n\u003ctd\u003ePath to config file\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003chr\u003e","notes":""},{"type":"content","title":"Running in HTTP mode","content":"","notes":""},{"type":"content","title":"1. Start the server","content":"\u003cpre\u003e\u003ccode class=\"language-bash\"\u003eMCP_TRANSPORT=http ADDR=:8080 go run ./cmd\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eOr with a pre-built binary:\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"language-bash\"\u003ego build -o slide-forge ./cmd\nMCP_TRANSPORT=http ADDR=:8080 ./slide-forge\n\u003c/code\u003e\u003c/pre\u003e","notes":""},{"type":"content","title":"2. Verify it's up","content":"\u003cpre\u003e\u003ccode class=\"language-bash\"\u003ecurl http://localhost:8080/health\n# → {\u0026quot;status\u0026quot;:\u0026quot;ok\u0026quot;}\n\ncurl http://localhost:8080/ready\n# → {\u0026quot;status\u0026quot;:\u0026quot;ready\u0026quot;}\n\u003c/code\u003e\u003c/pre\u003e","notes":""},{"type":"content","title":"3. Call the tool directly (curl)","content":"\u003cpre\u003e\u003ccode class=\"language-bash\"\u003ecurl -X POST http://localhost:8080/mcp/ \\\n  -H \u0026quot;Content-Type: application/json\u0026quot; \\\n  -d '{\n    \u0026quot;jsonrpc\u0026quot;: \u0026quot;2.0\u0026quot;,\n    \u0026quot;id\u0026quot;: 1,\n    \u0026quot;method\u0026quot;: \u0026quot;tools/call\u0026quot;,\n    \u0026quot;params\u0026quot;: {\n      \u0026quot;name\u0026quot;: \u0026quot;md_to_html_slides\u0026quot;,\n      \u0026quot;arguments\u0026quot;: {\n        \u0026quot;markdown\u0026quot;: \u0026quot;# Hello\\n\\n## Slide two\\n\\nBody text.\u0026quot;,\n        \u0026quot;theme\u0026quot;: \u0026quot;dark\u0026quot;,\n        \u0026quot;transition_style\u0026quot;: \u0026quot;slide\u0026quot;\n      }\n    }\n  }'\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eResponse contains the full standalone HTML in \u003ccode\u003eresult.content[0].text\u003c/code\u003e. Write it to a file and open in a browser.\u003c/p\u003e","notes":""},{"type":"content","title":"4. Connect Claude Code to a remote server","content":"\u003cp\u003eIn \u003ccode\u003e.mcp.json\u003c/code\u003e (or \u003ccode\u003e~/.claude/mcp.json\u003c/code\u003e):\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"language-json\"\u003e{\n  \u0026quot;mcpServers\u0026quot;: {\n    \u0026quot;slide-forge\u0026quot;: {\n      \u0026quot;type\u0026quot;: \u0026quot;http\u0026quot;,\n      \u0026quot;url\u0026quot;: \u0026quot;https://your-domain.com/mcp/\u0026quot;\n    }\n  }\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eThen use it the same way as local:\u003c/p\u003e\n\u003cpre\u003e\u003ccode\u003eConvert README.md into slides using the slide-forge tool. Use corporate theme.\n\u003c/code\u003e\u003c/pre\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cstrong\u003eNote:\u003c/strong\u003e HTTP mode is not production-ready yet — see TODO section below.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e","notes":""},{"type":"content","title":"Tool: md_to_html_slides","content":"\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eParameter\u003c/th\u003e\n\u003cth\u003eType\u003c/th\u003e\n\u003cth\u003eRequired\u003c/th\u003e\n\u003cth\u003eDefault\u003c/th\u003e\n\u003cth\u003eDescription\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ccode\u003emarkdown\u003c/code\u003e\u003c/td\u003e\n\u003ctd\u003estring\u003c/td\u003e\n\u003ctd\u003eYes\u003c/td\u003e\n\u003ctd\u003e—\u003c/td\u003e\n\u003ctd\u003eMarkdown to convert\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ccode\u003etheme\u003c/code\u003e\u003c/td\u003e\n\u003ctd\u003estring\u003c/td\u003e\n\u003ctd\u003eNo\u003c/td\u003e\n\u003ctd\u003e\u003ccode\u003elight\u003c/code\u003e\u003c/td\u003e\n\u003ctd\u003e\u003ccode\u003elight\u003c/code\u003e, \u003ccode\u003edark\u003c/code\u003e, \u003ccode\u003eminimal\u003c/code\u003e, \u003ccode\u003ecorporate\u003c/code\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ccode\u003etransition_style\u003c/code\u003e\u003c/td\u003e\n\u003ctd\u003estring\u003c/td\u003e\n\u003ctd\u003eNo\u003c/td\u003e\n\u003ctd\u003e\u003ccode\u003efade\u003c/code\u003e\u003c/td\u003e\n\u003ctd\u003e\u003ccode\u003efade\u003c/code\u003e, \u003ccode\u003eslide\u003c/code\u003e, \u003ccode\u003enone\u003c/code\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ccode\u003eenable_keyboard_navigation\u003c/code\u003e\u003c/td\u003e\n\u003ctd\u003ebool\u003c/td\u003e\n\u003ctd\u003eNo\u003c/td\u003e\n\u003ctd\u003e\u003ccode\u003etrue\u003c/code\u003e\u003c/td\u003e\n\u003ctd\u003eArrow / Space key navigation\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ccode\u003einclude_progress_bar\u003c/code\u003e\u003c/td\u003e\n\u003ctd\u003ebool\u003c/td\u003e\n\u003ctd\u003eNo\u003c/td\u003e\n\u003ctd\u003e\u003ccode\u003etrue\u003c/code\u003e\u003c/td\u003e\n\u003ctd\u003eProgress bar at top\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003ccode\u003einclude_speaker_notes\u003c/code\u003e\u003c/td\u003e\n\u003ctd\u003ebool\u003c/td\u003e\n\u003ctd\u003eNo\u003c/td\u003e\n\u003ctd\u003e\u003ccode\u003etrue\u003c/code\u003e\u003c/td\u003e\n\u003ctd\u003eSpeaker notes panel\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003eReturns full HTML as a string. Write it to a \u003ccode\u003e.html\u003c/code\u003e file and open in any browser.\u003c/p\u003e\n\u003chr\u003e","notes":""},{"type":"content","title":"Project layout","content":"\u003cpre\u003e\u003ccode\u003ecmd/main.go                  ← entry point; transport selection, health endpoints\nconfig/config.yaml           ← default config with ${env:VAR=default} placeholders\ninternal/\n  config/                    ← AppConfig struct + YAML loader\n  derr/                      ← DError: structured errors with Kind + Op + Msg\n  domain/slide.go            ← value types (Slide, Theme, RenderRequest, …)\n  service/parser.go          ← Markdown → []Slide\n  service/renderer.go        ← []Slide → HTML string\n  handler/mcp.go             ← MCP tool registration and request handling\n\u003c/code\u003e\u003c/pre\u003e\n\u003chr\u003e","notes":""},{"type":"content","title":"Development commands","content":"\u003cpre\u003e\u003ccode class=\"language-bash\"\u003e# build\ngo build ./...\n\n# tests\ngo test ./...\n\n# tests with race detector (required before commit)\ngo test -race ./...\n\n# coverage report\ngo test -coverprofile=coverage.out ./... \u0026amp;\u0026amp; go tool cover -func=coverage.out\n\n# run in stdio mode (default — used by Claude Code)\ngo run ./cmd\n\n# run as HTTP server\nMCP_TRANSPORT=http go run ./cmd\n\n# run with debug logging\nLOG_LEVEL=debug go run ./cmd\n\u003c/code\u003e\u003c/pre\u003e\n\u003chr\u003e","notes":""},{"type":"content","title":"TODO — before HTTP production deployment","content":"\u003cul\u003e\n\u003cli\u003e\u003cinput disabled=\"\" type=\"checkbox\"\u003e \u003cstrong\u003eAuth\u003c/strong\u003e — bearer token middleware in \u003ccode\u003einternal/handler/\u003c/code\u003e before \u003ccode\u003e/mcp/\u003c/code\u003e is exposed publicly\u003c/li\u003e\n\u003cli\u003e\u003cinput disabled=\"\" type=\"checkbox\"\u003e \u003cstrong\u003eTLS\u003c/strong\u003e — put behind reverse proxy (nginx/caddy) or add \u003ccode\u003eListenAndServeTLS\u003c/code\u003e; plain HTTP not acceptable for public endpoints\u003c/li\u003e\n\u003cli\u003e\u003cinput disabled=\"\" type=\"checkbox\"\u003e \u003cstrong\u003eBody size limit\u003c/strong\u003e — wrap MCP handler with \u003ccode\u003ehttp.MaxBytesReader\u003c/code\u003e to prevent oversized payloads\u003c/li\u003e\n\u003cli\u003e\u003cinput disabled=\"\" type=\"checkbox\"\u003e \u003cstrong\u003eRate limiting\u003c/strong\u003e — add per-IP rate limiter middleware to prevent abuse\u003c/li\u003e\n\u003cli\u003e\u003cinput disabled=\"\" type=\"checkbox\"\u003e \u003cstrong\u003eTest coverage\u003c/strong\u003e — currently 51.7%; CI floor is 80%; need tests for \u003ccode\u003einternal/config\u003c/code\u003e, \u003ccode\u003einternal/derr\u003c/code\u003e, HTTP handler paths\u003c/li\u003e\n\u003c/ul\u003e","notes":""}],

      get progress() {
        if (this.slides.length <= 1) return 100;
        return Math.round((this.current / (this.slides.length - 1)) * 100);
      },

      init() {
        
      },

      next() {
        if (this.current < this.slides.length - 1) this.current++;
      },

      prev() {
        if (this.current > 0) this.current--;
      },

      goto(index) {
        if (index >= 0 && index < this.slides.length) this.current = index;
      },

      handleKey(e) {
        
        if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); this.next(); }
        if (e.key === 'ArrowLeft')                   { e.preventDefault(); this.prev(); }
        if (e.key === 'Home')                        { e.preventDefault(); this.goto(0); }
        if (e.key === 'End')                         { e.preventDefault(); this.goto(this.slides.length - 1); }
        if (e.key === 'f' || e.key === 'F')          { this.toggleFullscreen(); }
        if (e.key === 't' || e.key === 'T')          { this.showThumbs = !this.showThumbs; }
        
      },

      toggleFullscreen() {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen().catch(() => {});
        } else {
          document.exitFullscreen().catch(() => {});
        }
      },
    };
  }
</script>
